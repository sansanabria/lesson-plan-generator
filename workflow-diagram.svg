<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Animated dot glow -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- n8n dark background -->
  <rect width="1400" height="520" rx="16" fill="#1a1a2e"/>

  <!-- ==================== CONNECTORS ==================== -->
  <!-- Main horizontal line segments -->
  <path id="c1" d="M 148,300 L 218,300" stroke="#555" stroke-width="1.8" fill="none"/>
  <path id="c2" d="M 298,300 L 368,300" stroke="#555" stroke-width="1.8" fill="none"/>
  <path id="c3" d="M 448,300 L 508,300" stroke="#555" stroke-width="1.8" fill="none"/>

  <!-- IF true branch (up to Gemini image) -->
  <path id="c4t" d="M 568,280 C 588,280 600,200 640,200" stroke="#555" stroke-width="1.8" fill="none"/>
  <!-- IF false branch (down to Gemini text) -->
  <path id="c4f" d="M 568,320 C 588,320 600,390 640,390" stroke="#555" stroke-width="1.8" fill="none"/>

  <!-- Gemini image → Notion -->
  <path id="c5" d="M 720,200 C 760,200 780,300 830,300" stroke="#555" stroke-width="1.8" fill="none"/>
  <!-- Gemini text → Notion -->
  <path id="c6" d="M 720,390 C 760,390 780,300 830,300" stroke="#555" stroke-width="1.8" fill="none"/>

  <!-- Notion → Code build blocks -->
  <path id="c7" d="M 910,300 L 980,300" stroke="#555" stroke-width="1.8" fill="none"/>
  <!-- Code → HTTP title -->
  <path id="c8" d="M 1060,300 L 1120,300" stroke="#555" stroke-width="1.8" fill="none"/>
  <!-- HTTP title → HTTP append -->
  <path id="c9" d="M 1200,300 L 1250,300" stroke="#555" stroke-width="1.8" fill="none"/>
  <!-- HTTP append → Form completed -->
  <path id="c10" d="M 1330,300 L 1370,300" stroke="#555" stroke-width="1.8" fill="none"/>

  <!-- Animated flowing dots on main paths -->
  <circle r="3.5" fill="#ff6d5a" filter="url(#dotGlow)">
    <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#c1"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#ff6d5a" filter="url(#dotGlow)">
    <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#c2"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#ff6d5a" filter="url(#dotGlow)">
    <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#c3"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#4cd964" filter="url(#dotGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#c4t"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#4cd964" filter="url(#dotGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#c4f"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#a78bfa" filter="url(#dotGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#c5"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#a78bfa" filter="url(#dotGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#c6"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#a78bfa" filter="url(#dotGlow)">
    <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#c7"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#ff6d5a" filter="url(#dotGlow)">
    <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#c8"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#60a5fa" filter="url(#dotGlow)">
    <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#c9"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#4cd964" filter="url(#dotGlow)">
    <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#c10"/></animateMotion>
  </circle>

  <!-- ==================== NODES ==================== -->

  <!-- 1. On form submission (trigger - orange) -->
  <g filter="url(#shadow)">
    <rect x="68" y="270" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <rect x="68" y="270" width="4" height="60" rx="2" fill="#ff6d5a"/>
    <!-- Trigger icon -->
    <g transform="translate(96, 286)">
      <rect x="0" y="0" width="24" height="28" rx="4" fill="none" stroke="#ff6d5a" stroke-width="1.8"/>
      <path d="M7,9 L17,9 M7,15 L14,15 M7,21 L11,21" stroke="#ff6d5a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
  <text x="108" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">On form</text>
  <text x="108" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">submission</text>

  <!-- 2. Code — detect inputs -->
  <g filter="url(#shadow)">
    <rect x="218" y="270" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <text x="258" y="306" text-anchor="middle" font-family="monospace" font-size="22" fill="#ff6d5a" font-weight="700">{}</text>
  </g>
  <text x="258" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">Code — detect</text>
  <text x="258" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">inputs</text>

  <!-- 3. Code — build context -->
  <g filter="url(#shadow)">
    <rect x="368" y="270" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <text x="408" y="306" text-anchor="middle" font-family="monospace" font-size="22" fill="#ff6d5a" font-weight="700">{}</text>
  </g>
  <text x="408" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">Code — build</text>
  <text x="408" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">context</text>

  <!-- 4. IF — has images (green) -->
  <g filter="url(#shadow)">
    <rect x="508" y="270" width="60" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <!-- IF split icon -->
    <g transform="translate(525, 288)">
      <path d="M0,12 L12,0 L24,12 L12,24 Z" fill="none" stroke="#4cd964" stroke-width="2"/>
      <text x="12" y="16" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#4cd964" font-weight="700">IF</text>
    </g>
  </g>
  <!-- true/false labels -->
  <text x="575" y="275" font-family="'Inter',sans-serif" font-size="8" fill="#4cd964">true</text>
  <text x="575" y="340" font-family="'Inter',sans-serif" font-size="8" fill="#888">false</text>
  <text x="538" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">IF — has</text>
  <text x="538" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">images</text>

  <!-- 5. Gemini — image analyze (top branch) -->
  <g filter="url(#shadow)">
    <rect x="640" y="170" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <!-- Gemini sparkle -->
    <g transform="translate(666, 186)">
      <path d="M14,0 C14,8 18,12 28,12 C18,12 14,16 14,24 C14,16 10,12 0,12 C10,12 14,8 14,0Z" fill="#4facfe"/>
      <path d="M22,2 C22,5 24,7 28,7 C24,7 22,9 22,12 C22,9 20,7 16,7 C20,7 22,5 22,2Z" fill="#ff6b6b" opacity="0.8"/>
    </g>
  </g>
  <text x="680" y="248" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc" font-weight="600">Gemini — image</text>
  <text x="680" y="260" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">analyze</text>
  <text x="680" y="274" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#666">analyze: image</text>

  <!-- 6. Gemini — text (bottom branch, dark node) -->
  <g filter="url(#shadow)">
    <rect x="640" y="360" width="80" height="60" rx="10" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
    <!-- Gemini sparkle -->
    <g transform="translate(666, 376)">
      <path d="M14,0 C14,8 18,12 28,12 C18,12 14,16 14,24 C14,16 10,12 0,12 C10,12 14,8 14,0Z" fill="#4facfe"/>
      <path d="M22,2 C22,5 24,7 28,7 C24,7 22,9 22,12 C22,9 20,7 16,7 C20,7 22,5 22,2Z" fill="#ff6b6b" opacity="0.8"/>
    </g>
  </g>
  <text x="680" y="438" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc" font-weight="600">Gemini — text</text>
  <text x="680" y="452" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#666">message: text</text>
  <!-- Tools label -->
  <text x="680" y="478" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#555">Tools</text>
  <circle cx="680" cy="488" r="6" fill="none" stroke="#555" stroke-width="1"/>
  <text x="680" y="491" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" fill="#555">+</text>

  <!-- 7. Notion — Create Page (dark icon with N) -->
  <g filter="url(#shadow)">
    <rect x="830" y="270" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <g transform="translate(856, 284)">
      <rect x="0" y="0" width="28" height="32" rx="4" fill="none" stroke="#aaa" stroke-width="1.5"/>
      <text x="14" y="22" text-anchor="middle" font-family="'Inter',serif" font-size="16" fill="#aaa" font-weight="700">N</text>
    </g>
  </g>
  <text x="870" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">Notion — Create</text>
  <text x="870" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">Page</text>
  <text x="870" y="378" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#666">create: page</text>

  <!-- 8. Code — build blocks -->
  <g filter="url(#shadow)">
    <rect x="980" y="270" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <text x="1020" y="306" text-anchor="middle" font-family="monospace" font-size="22" fill="#ff6d5a" font-weight="700">{}</text>
  </g>
  <text x="1020" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">Code — build</text>
  <text x="1020" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">blocks</text>

  <!-- 9. HTTP — Notion update title (globe) -->
  <g filter="url(#shadow)">
    <rect x="1120" y="270" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <g transform="translate(1146, 285)">
      <circle cx="14" cy="15" r="12" fill="none" stroke="#a78bfa" stroke-width="1.8"/>
      <ellipse cx="14" cy="15" rx="6" ry="12" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
      <line x1="2" y1="15" x2="26" y2="15" stroke="#a78bfa" stroke-width="1"/>
      <line x1="5" y1="8" x2="23" y2="8" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="5" y1="22" x2="23" y2="22" stroke="#a78bfa" stroke-width="0.8"/>
    </g>
  </g>
  <text x="1160" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">HTTP — Notion</text>
  <text x="1160" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">update title</text>

  <!-- 10. HTTP — Notion append (globe) -->
  <g filter="url(#shadow)">
    <rect x="1250" y="270" width="80" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <g transform="translate(1276, 285)">
      <circle cx="14" cy="15" r="12" fill="none" stroke="#a78bfa" stroke-width="1.8"/>
      <ellipse cx="14" cy="15" rx="6" ry="12" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
      <line x1="2" y1="15" x2="26" y2="15" stroke="#a78bfa" stroke-width="1"/>
      <line x1="5" y1="8" x2="23" y2="8" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="5" y1="22" x2="23" y2="22" stroke="#a78bfa" stroke-width="0.8"/>
    </g>
  </g>
  <text x="1290" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">HTTP — Notion</text>
  <text x="1290" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">append</text>

  <!-- 11. Form — completed (green) -->
  <g filter="url(#shadow)">
    <rect x="1370" y="270" width="24" height="60" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <rect x="1370" y="270" width="4" height="60" rx="2" fill="#4cd964"/>
  </g>
  <text x="1382" y="352" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">Form —</text>
  <text x="1382" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" fill="#ccc">completed</text>

  <!-- Title bar -->
  <text x="700" y="38" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">Lesson Plan Generator</text>
</svg>